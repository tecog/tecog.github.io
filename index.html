---
layout: default
---

<div class="posts">
  {% for post in site.posts %}
    <article class="post">

      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

      <div class="entry">
        {{ post.excerpt }}
      </div>

      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
    </article>
  {% endfor %}
</div>

<script type="text/javascript">
	setTimeout(() => {
     L2Dwidget.init({
             "model": {
                     "scale": 0.5,
		     
             },
             "display": {
                    "position": "right",
                    "width": 180,

            "mobile": {
                    "show": true,
                    "scale": 0.5
            },
            "react": {
                    "opacityDefault": 0.7,
                    "opacityOnHover": 0.2
            }
    });
}, 1000)
</script>
